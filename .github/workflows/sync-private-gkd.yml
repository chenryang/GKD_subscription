name: Sync Private GKD Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */12 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repository
        uses: actions/checkout@v5
        with:
          path: private-repo

      - name: Checkout upstream repository
        uses: actions/checkout@v5
        with:
          repository: Lin-arm/GKD_subscription
          ref: main
          path: upstream

      - name: Preserve private automation
        run: |
          mkdir -p upstream/private
          cp private-repo/private/apply_private_rules.mjs upstream/private/apply_private_rules.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Apply private rules
        working-directory: upstream
        run: node private/apply_private_rules.mjs .

      - name: Install dependencies
        working-directory: upstream
        run: npx pnpm@10.25.0 install --frozen-lockfile

      - name: Check subscription
        working-directory: upstream
        run: npx pnpm@10.25.0 run check

      - name: Build subscription
        working-directory: upstream
        run: npx pnpm@10.25.0 run build

      - name: Merge synchronized result into private repository
        run: |
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='private/' \
            --exclude='.github/workflows/' \
            --exclude='AGENTS.md' \
            --exclude='docs/key-usage.md' \
            --exclude='docs/llm-wiki/' \
            upstream/ private-repo/

      - name: Commit synchronized result
        working-directory: private-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit --no-verify -m "chore: sync upstream with private rules"
          fi

      - name: Push to private repository
        working-directory: private-repo
        run: git push origin HEAD:${GITHUB_REF_NAME} --no-verify
